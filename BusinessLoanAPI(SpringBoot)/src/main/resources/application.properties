spring.application.name=BusinessLoanAPISpringBoot

# Preview environment expects the backend to bind to port 3010 and be reachable externally.
# Bind to 0.0.0.0 so the preview readiness check can connect to the service.
server.port=3010
server.address=0.0.0.0

# ========= Database (Neon PostgreSQL) =========
# Datasource is configured via env vars.
#
# Required env vars (DB enabled):
#   DATABASE_URL  (JDBC form, provided directly)
#     Example:
#       jdbc:postgresql://<host>:5432/<db>?user=<user>&password=<pass>&sslmode=require
#
# Optional (only if not embedded in DATABASE_URL query params):
#   DATABASE_USERNAME
#   DATABASE_PASSWORD
#
# Note: Any URI-form (postgresql://...) to JDBC conversion has been removed/simplified; the app
# now expects a JDBC URL directly to ensure Flyway/JPA run against exactly what Neon provides.
# IMPORTANT:
# Do NOT bind spring.datasource.url directly to NEON_DATABASE_URL because Neon commonly provides
# a URI form (postgresql://...) which Spring Boot cannot use as a JDBC URL.
#
# Instead, NeonDatasourceEnvironmentPostProcessor (registered in META-INF/spring.factories)
# will populate spring.datasource.url early from:
#   - DATABASE_URL (JDBC or URI)
#   - NEON_DATABASE_URL (URI)
# converting URI -> JDBC when necessary.
#
# If you want to override explicitly, set SPRING_DATASOURCE_URL in the environment.
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool sizing (tune as needed)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ========= JPA/Hibernate =========
# Use migrations as source of truth; Hibernate should not auto-create/alter schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ========= Flyway migrations =========
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

# Swagger/OpenAPI Configuration
# Use Springdoc defaults so tools/preview environments can find:
#  - OpenAPI JSON: /v3/api-docs
#  - Swagger UI:   /swagger-ui/index.html
#
# Explicitly set the UI base path to "/swagger-ui" (Springdoc 2.x convention).
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
#
# IMPORTANT (Preview/Proxy compatibility):
# In preview, the service is typically mounted under a non-root base path by a reverse proxy
# (e.g. /proxy/3010). When Swagger UI is served from:
#   /proxy/3010/swagger-ui/index.html
# any absolute URLs like:
#   /v3/api-docs/swagger-config
# will be requested from the host root (missing /proxy/3010) and fail (404/403).
#
# Use RELATIVE URLs so they resolve correctly both:
#  - locally (no proxy): /swagger-ui/index.html -> ../v3/api-docs -> /v3/api-docs
#  - behind preview proxy: /proxy/3010/swagger-ui/index.html -> ../v3/api-docs -> /proxy/3010/v3/api-docs
springdoc.swagger-ui.config-url=../v3/api-docs/swagger-config
springdoc.swagger-ui.url=../v3/api-docs
# Keep OAuth2 redirect URL relative as well (safe even if OAuth2 isn't enabled).
springdoc.swagger-ui.oauth2-redirect-url=oauth2-redirect.html

# Respect X-Forwarded-* / Forwarded headers so redirects preserve external scheme/host/port
server.forward-headers-strategy=framework

# ========= App security settings =========
# Required env vars:
#   JWT_SECRET
# Optional:
#   JWT_ISSUER, JWT_ACCESS_TOKEN_TTL_SECONDS, JWT_REFRESH_TOKEN_TTL_SECONDS
app.jwt.secret=${JWT_SECRET}
app.jwt.issuer=${JWT_ISSUER:business-loan-api}
app.jwt.access-token-ttl-seconds=${JWT_ACCESS_TOKEN_TTL_SECONDS:900}
app.jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TOKEN_TTL_SECONDS:1209600}

# ========= Supporting document upload/storage =========
# Optional env vars (set by orchestrator):
#   DOCUMENT_STORAGE_ROOT     e.g. /var/lib/business-loan/documents (must be writable)
app.documents.storage-root=${DOCUMENT_STORAGE_ROOT:./data/documents}

# ========= Credit bureau integration (MVP stub) =========
# Defaults are safe and require no credentials.
# Future: set app.credit-bureau.provider to a real provider and add corresponding credentials/env vars.
app.credit-bureau.enabled=${CREDIT_BUREAU_ENABLED:true}
app.credit-bureau.provider=${CREDIT_BUREAU_PROVIDER:stub}

# ========= Notifications (email/SMS) =========
# Notifications are disabled by default and use stub providers by default.
# To enable in a real environment:
# - set APP_NOTIFICATIONS_ENABLED=true
# - set APP_NOTIFICATIONS_EMAIL_PROVIDER=sendgrid and configure SendGrid env vars
# - set APP_NOTIFICATIONS_SMS_PROVIDER=twilio and configure Twilio env vars
app.notifications.enabled=${APP_NOTIFICATIONS_ENABLED:false}

# Providers: stub | sendgrid | (future)
app.notifications.email.provider=${APP_NOTIFICATIONS_EMAIL_PROVIDER:stub}
app.notifications.sms.provider=${APP_NOTIFICATIONS_SMS_PROVIDER:stub}

# From number/email used by some providers
app.notifications.email.from=${APP_NOTIFICATIONS_EMAIL_FROM:no-reply@example.com}
app.notifications.sms.from=${APP_NOTIFICATIONS_SMS_FROM:+10000000000}

# Optional: when enabled, send a copy to an internal officer inbox/phone (e.g. shared queue)
app.notifications.officer.email=${APP_NOTIFICATIONS_OFFICER_EMAIL:}
app.notifications.officer.phone=${APP_NOTIFICATIONS_OFFICER_PHONE:}

# Provider config hooks (do not set real credentials by default)
app.notifications.sendgrid.api-key=${SENDGRID_API_KEY:}
app.notifications.sendgrid.base-url=${SENDGRID_BASE_URL:https://api.sendgrid.com}

app.notifications.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.notifications.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.notifications.twilio.base-url=${TWILIO_BASE_URL:https://api.twilio.com}

# Validation limits
# 10 MiB default (10485760 bytes)
app.documents.max-bytes=${DOCUMENT_MAX_BYTES:10485760}
app.documents.allowed-content-types=${DOCUMENT_ALLOWED_CONTENT_TYPES:application/pdf,image/jpeg,image/png}

# Multipart limits (Spring-level; should be >= app.documents.max-bytes)
spring.servlet.multipart.max-file-size=${SPRING_MULTIPART_MAX_FILE_SIZE:12MB}
spring.servlet.multipart.max-request-size=${SPRING_MULTIPART_MAX_REQUEST_SIZE:12MB}
