spring.application.name=BusinessLoanAPISpringBoot

# Preview environment expects the backend to bind to port 3010 and be reachable externally.
# Bind to 0.0.0.0 so the preview readiness check can connect to the service.
server.port=3010
server.address=0.0.0.0

# ========= Database (Neon PostgreSQL) =========
# Required env vars (set in container .env by orchestrator):
#   DATABASE_URL              e.g. jdbc:postgresql://<host>:5432/<db>?sslmode=require
#   DATABASE_USERNAME
#   DATABASE_PASSWORD
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool sizing (tune as needed)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ========= JPA/Hibernate =========
# Use migrations as source of truth; Hibernate should not auto-create/alter schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ========= Flyway migrations =========
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Respect X-Forwarded-* / Forwarded headers so redirects preserve external scheme/host/port
server.forward-headers-strategy=framework

# ========= App security settings =========
# Required env vars:
#   JWT_SECRET
# Optional:
#   JWT_ISSUER, JWT_ACCESS_TOKEN_TTL_SECONDS, JWT_REFRESH_TOKEN_TTL_SECONDS
app.jwt.secret=${JWT_SECRET}
app.jwt.issuer=${JWT_ISSUER:business-loan-api}
app.jwt.access-token-ttl-seconds=${JWT_ACCESS_TOKEN_TTL_SECONDS:900}
app.jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TOKEN_TTL_SECONDS:1209600}
