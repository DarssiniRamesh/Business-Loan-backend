# Preview-safe profile: start the web server without requiring a database.
# This is used automatically when DATABASE_URL is not provided (see application.properties).

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

# Keep actuator enabled for preview readiness checks.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

# In no-db mode, any repository/service that needs DB will fail at runtime if called.
# However, /actuator/health and /v3/api-docs remain accessible so the preview can validate connectivity.
