name: SonarCloud (backend)

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: Business-Loan-backend/BusinessLoanAPI(SpringBoot)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew --no-daemon test sonar \
            -Dsonar.organization=darssiniramesh \
            -Dsonar.projectKey=DarssiniRamesh_Business-Loan-backend \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token="${SONAR_TOKEN}"
