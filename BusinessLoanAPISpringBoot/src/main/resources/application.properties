spring.application.name=BusinessLoanAPISpringBoot

# -----------------------------
# Database Configuration (Neon Postgres)
# -----------------------------
# This service is configured to run against Neon (PostgreSQL) in hosted environments.
#
# Supported env var patterns:
#  1) Recommended: provide a full JDBC URL (works well with Neon connection strings):
#       DATABASE_URL=jdbc:postgresql://<host>:<port>/<db>?sslmode=require
#     (or: JDBC_DATABASE_URL)
#
#  2) Component vars (fallback):
#       DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD, DB_SSLMODE
#
# Local-dev fallback:
#   If none of the above are set, defaults target a local Postgres running on localhost:5432
#   with database "business_loan_api_db" and user/pass "postgres".
#
# IMPORTANT (Neon):
#   Neon generally requires SSL. We default sslmode to "require" so production works by default.
spring.datasource.url=${DATABASE_URL:${JDBC_DATABASE_URL:jdbc:postgresql://${DB_HOST:${PGHOST:localhost}}:${DB_PORT:${PGPORT:5432}}/${DB_NAME:${PGDATABASE:business_loan_api_db}}?sslmode=${DB_SSLMODE:${PGSSLMODE:require}}}}
spring.datasource.username=${DB_USER:${PGUSER:postgres}}
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------
# JPA / Hibernate
# -----------------------------
# IMPORTANT: Do not auto-create/drop schema; Flyway manages DDL.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# -----------------------------
# Flyway migrations
# -----------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# When pointing at an existing DB that already has the schema but no flyway history,
# baseline so Flyway can take over without trying to re-run V1.
# Important: baseline version MUST be < first migration version, otherwise V1 will be skipped.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=pre_flyway_baseline

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Respect X-Forwarded-* / Forwarded headers so redirects preserve external scheme/host/port
server.forward-headers-strategy=framework
